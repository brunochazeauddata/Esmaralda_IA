<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Therapy - Assistant Intelligent</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons (Optionnel pour des icônes propres) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Header & Tabs --- */
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
        }

        .tab {
            padding: 8px 20px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* --- Content Area --- */
        .tab-content {
            flex: 1;
            display: none;
            overflow: hidden;
            position: relative;
        }

        .tab-content.active { display: flex; flex-direction: column; }

        /* --- Chat Interface --- */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Scrollbar ultra fine */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
        }

        .user .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        /* --- Input Area --- */
        .input-area {
            padding: 24px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        #user-input:focus { border-color: var(--primary); }

        #send-btn {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #send-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- History Tab --- */
        #history-tab { padding: 24px; overflow-y: auto; }

        .session-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .session-header {
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-header:hover { background: rgba(255, 255, 255, 0.05); }

        .session-details {
            padding: 0 16px 16px 16px;
            display: none;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.1);
        }

        .msg-item {
            margin-top: 12px;
            font-size: 0.85rem;
            padding: 8px;
            border-radius: 8px;
        }

        .human-msg { color: #818cf8; background: rgba(129, 140, 248, 0.1); }
        .ai-msg { color: #34d399; background: rgba(52, 211, 153, 0.1); }

        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 40px;
            color: var(--text-dim);
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>AI.Therapy</h1>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('chat')">Assistant</button>
                <button class="tab" onclick="switchTab('history')">Historique</button>
            </div>
        </header>

        <!-- Onglet Chat -->
        <div id="chat-tab" class="tab-content active">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Comment vous sentez-vous aujourd'hui ?" onkeypress="if(event.key === 'Enter') sendMessage()" />
                <button id="send-btn" onclick="sendMessage()">
                    <span>Envoyer</span>
                    <i data-lucide="send" style="width: 18px;"></i>
                </button>
            </div>
        </div>

        <!-- Onglet Historique -->
        <div id="history-tab" class="tab-content">
            <div id="sessions-list">
                <div class="loading-spinner">Chargement de vos souvenirs...</div>
            </div>
        </div>
    </div>

    <script>
        // Initialisation des icônes
        lucide.createIcons();

        // ========== CONFIGURATION (Gardée de ton code original) ==========
        const N8N_WEBHOOK_URL = 'https://n8n.srv998468.hstgr.cloud/webhook/7d0ef59e-1d83-490d-97d1-fc43f4b6aeaf/chat';
        const SUPABASE_URL = 'https://cnpnefhcxwwvvkuoihbm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNucG5lZmhjeHd3dnZrdW9paGJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjczODEsImV4cCI6MjA5NDYwMzM4MX0.adTRk0wdINea3KCfgYRGDhFL4phUW36RRH--T128aMY';

        let sessionId = localStorage.getItem('chatSessionId') || generateUUID();
        localStorage.setItem('chatSessionId', sessionId);

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ========== LOGIQUE CHAT ==========
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            
            const btn = document.getElementById('send-btn');
            btn.disabled = true;

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: message, sessionId: sessionId })
                });
                const data = await response.json();
                const assistantMessage = data.output || data.text || data.response || "Je vous écoute...";
                appendMessage('assistant', assistantMessage);
            } catch (error) {
                appendMessage('assistant', "Désolé, j'ai rencontré une petite erreur technique.");
            } finally {
                btn.disabled = false;
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.innerHTML = `<div class="message-content">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== LOGIQUE HISTORIQUE AMÉLIORÉE ==========
        async function loadHistory() {
            const container = document.getElementById('sessions-list');
            container.innerHTML = '<div class="loading-spinner">Analyse de l\'historique...</div>';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/n8n_chat_histories?select=session_id,message,id&order=id.desc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                const messages = await res.json();
                const sessions = {};

                messages.forEach(msg => {
                    if (!sessions[msg.session_id]) sessions[msg.session_id] = [];
                    try {
                        const parsed = JSON.parse(msg.message);
                        sessions[msg.session_id].push({ role: parsed.type, content: parsed.content });
                    } catch(e) {}
                });

                container.innerHTML = '';
                if (Object.keys(sessions).length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:var(--text-dim)">Aucune conversation passée.</p>';
                    return;
                }

                for (const [sid, msgs] of Object.entries(sessions)) {
                    const card = document.createElement('div');
                    card.className = 'session-card';
                    const title = msgs[0]?.content.substring(0, 60) + '...' || 'Session sans titre';
                    
                    card.innerHTML = `
                        <div class="session-header" onclick="toggleSession(this)">
                            <span style="font-size:0.9rem; font-weight:500">${title}</span>
                            <i data-lucide="chevron-down" style="width:16px"></i>
                        </div>
                        <div class="session-details">
                            ${msgs.reverse().map(m => `
                                <div class="msg-item ${m.role === 'human' ? 'human-msg' : 'ai-msg'}">
                                    <strong>${m.role === 'human' ? 'Vous' : 'IA'} :</strong> ${escapeHtml(m.content)}
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(card);
                }
                lucide.createIcons();
            } catch (error) {
                container.innerHTML = '<p>Erreur lors du chargement.</p>';
            }
        }

        function toggleSession(header) {
            const details = header.nextElementSibling;
            const isVisible = details.style.display === 'block';
            details.style.display = isVisible ? 'none' : 'block';
            header.querySelector('i').style.transform = isVisible ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'chat') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('chat-tab').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('history-tab').classList.add('active');
                loadHistory();
            }
        }

        window.onload = () => {
            appendMessage('assistant', 'Bonjour. Je suis votre espace de parole sécurisé. Comment puis-je vous aider aujourd\'hui ?');
        };
    </script>
</body>
</html>
