<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA - Chat & Historique</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; flex: 1; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border: none; border-radius: 8px 8px 0 0; margin-right: 5px; }
        .tab.active { background: white; border: 2px solid #ddd; border-bottom: none; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #ccc; border-radius: 8px; padding: 15px; background: white; margin-bottom: 15px; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message-content { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; }
        .user .message-content { background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .assistant .message-content { background: #e9ecef; color: #1a1a1a; border-bottom-left-radius: 4px; }
        .input-area { display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 24px; font-size: 16px; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #sessions-list { background: white; border-radius: 8px; border: 1px solid #ccc; padding: 15px; }
        .session-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .session-item:hover { background: #f0f0f0; }
        .session-details { display: none; padding: 10px; background: #fafafa; border-radius: 4px; margin-top: 5px; }
        .session-details .msg { margin-bottom: 8px; font-size: 14px; }
        .human-msg { color: #007bff; }
        .ai-msg { color: #28a745; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Assistant Thérapeutique</h1>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('chat')">Chat</button>
            <button class="tab" onclick="switchTab('history')">Historique</button>
        </div>

        <!-- Onglet Chat -->
        <div id="chat-tab" class="tab-content active">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Écrivez votre message..." />
                <button id="send-btn" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>

        <!-- Onglet Historique -->
        <div id="history-tab" class="tab-content">
            <div id="sessions-list">
                <div class="loading">Chargement des conversations...</div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const N8N_WEBHOOK_URL = 'https://n8n.srv998468.hstgr.cloud/webhook/7d0ef59e-1d83-490d-97d1-fc43f4b6aeaf/chat';  //
        const SUPABASE_URL = 'https://cnpnefhcxwwvvkuoihbm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNucG5lZmhjeHd3dnZrdW9paGJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjczODEsImV4cCI6MjA5NDYwMzM4MX0.adTRk0wdINea3KCfgYRGDhFL4phUW36RRH--T128aMY';
        //

        // ========== GESTION DE SESSION ==========
        let sessionId = localStorage.getItem('chatSessionId');
        if (!sessionId) {
            sessionId = generateUUID();
            localStorage.setItem('chatSessionId', sessionId);
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ========== CHAT ==========
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            // Afficher le message utilisateur
            appendMessage('user', message);
            input.value = '';
            document.getElementById('send-btn').disabled = true;

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatInput: message,
                        sessionId: sessionId
                    })
                });
                const data = await response.json();
                const assistantMessage = data.output || data.text || data.response || data.message || 'Réponse reçue.';
                appendMessage('assistant', assistantMessage);
            } catch (error) {
                console.error(error);
                appendMessage('assistant', 'Erreur de connexion au serveur.');
            } finally {
                document.getElementById('send-btn').disabled = false;
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.innerHTML = `<div class="message-content">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ========== HISTORIQUE ==========
        async function loadHistory() {
            const container = document.getElementById('sessions-list');
            container.innerHTML = '<div class="loading">Chargement des conversations...</div>';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/n8n_chat_histories?select=session_id,message,id&order=id.asc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!res.ok) throw new Error(`Erreur ${res.status}`);
                const messages = await res.json();

                // Grouper par session_id
                const sessions = {};
                messages.forEach(msg => {
                    const sid = msg.session_id;
                    if (!sessions[sid]) sessions[sid] = [];
                    const parsed = JSON.parse(msg.message);  // {"type":"human", "content":"..."}
                    sessions[sid].push({ role: parsed.type, content: parsed.content });
                });

                if (Object.keys(sessions).length === 0) {
                    container.innerHTML = '<p>Aucune conversation enregistrée.</p>';
                    return;
                }

                // Afficher la liste des sessions
                container.innerHTML = '';
                for (const [sid, msgs] of Object.entries(sessions)) {
                    const sessionDiv = document.createElement('div');
                    sessionDiv.classList.add('session-item');
                    const firstMsg = msgs[0]?.content?.substring(0, 80) || 'Conversation';
                    sessionDiv.innerHTML = `<strong>${sid.slice(0, 8)}...</strong> - ${escapeHtml(firstMsg)}...`;

                    // Zone détail (messages)
                    const detailDiv = document.createElement('div');
                    detailDiv.classList.add('session-details');
                    msgs.forEach(m => {
                        const msgClass = m.role === 'human' ? 'human-msg' : 'ai-msg';
                        detailDiv.innerHTML += `<div class="msg ${msgClass}"><strong>${m.role === 'human' ? 'Vous' : 'Assistant'} :</strong> ${escapeHtml(m.content)}</div>`;
                    });

                    sessionDiv.onclick = () => {
                        detailDiv.style.display = detailDiv.style.display === 'block' ? 'none' : 'block';
                    };
                    container.appendChild(sessionDiv);
                    container.appendChild(detailDiv);
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p>Impossible de charger l\'historique.</p>';
            }
        }

        // ========== CHANGEMENT D'ONGLET ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'chat') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('chat-tab').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('history-tab').classList.add('active');
                loadHistory();  // Charger l'historique chaque fois qu'on ouvre l'onglet
            }
        }

        // Charger quelques messages de démonstration au besoin
        window.onload = () => {
            appendMessage('assistant', 'Bonjour, je suis votre assistant thérapeutique. Comment puis-je vous aider aujourd\'hui ?');
        };
    </script>
</body>
</html>
